<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow | Smart To-Do App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div class="app-wrapper">
            
            <!-- Header -->
            <header class="app-header">
                <div class="header-icon">✅</div>
                <h1>TaskFlow</h1>
                <p>Organize your day, one task at a time</p>
            </header>

            <!-- Add Task Section -->
            <div class="add-task-section">
                <div class="input-group">
                    <input type="text" id="taskInput" placeholder="What do you need to do?" maxlength="100">
                    <button id="addBtn" class="add-btn">
                        <span>+</span> Add Task
                    </button>
                </div>
                <div class="task-stats" id="taskStats">
                    <span>📋 0 tasks</span>
                    <span>✅ 0 completed</span>
                </div>
            </div>

            <!-- Tasks Container -->
            <div class="tasks-container">
                <div class="tasks-header">
                    <h2>My Tasks</h2>
                    <div class="filter-buttons">
                        <button class="filter-btn active" data-filter="all">All</button>
                        <button class="filter-btn" data-filter="active">Active</button>
                        <button class="filter-btn" data-filter="completed">Completed</button>
                    </div>
                </div>
                
                <div id="tasksList" class="tasks-list">
                    <!-- Tasks will be dynamically inserted here -->
                    <div class="empty-state">
                        <div class="empty-icon">📝</div>
                        <p>No tasks yet. Add your first task above!</p>
                    </div>
                </div>
            </div>

            <!-- Footer Actions -->
            <div class="app-footer">
                <button id="clearCompletedBtn" class="clear-btn">
                    🗑️ Clear Completed
                </button>
                <button id="deleteAllBtn" class="delete-all-btn">
                    ⚠️ Delete All Tasks
                </button>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
